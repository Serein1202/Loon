    <!--通用JS 其中尺寸按照设计稿尺寸-->
    <script>
      (function (doc, win) {
        var docEl = doc.documentElement,
          resizeEvt =
            "orientationchange" in window ? "orientationchange" : "resize",
          recalc = function () {
            var clientWidth = docEl.clientWidth;
            if (!clientWidth) return;
            if (clientWidth > 750) {
              docEl.style.fontSize = "100px";
            } else {
              docEl.style.fontSize = 100 * (clientWidth / 750) + "px";
            }
          };
        if (!doc.addEventListener) return;
        win.addEventListener(resizeEvt, recalc, false);
        doc.addEventListener("DOMContentLoaded", recalc, false);
      })(document, window);
    </script>
    <script>
      const androidReg = /(Android)/i;
      const iosReg = /(iPhone|iPad|iPod|iOS)/i;
      if (androidReg.test(navigator.userAgent)) {
        var sinopecapp_loadNative = function (method, param) {
          return sinopecapp.sinopecapp_loadNative(method, param);
        };
      } else if (iosReg.test(navigator.userAgent)) {
        var sinopecapp_loadNative = function (method, param) {
          return window.webkit.messageHandlers.sinopecapp_loadNative.postMessage(
            { method, param },
          );
        };
      }
    </script>
